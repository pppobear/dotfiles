externals:
  archive_defaults:
    exact: true
    stripComponents: 1
    refreshPeriod: 168h
  git_repo_defaults:
    refreshPeriod: 168h
  archives:
    - target: .oh-my-zsh
      url: https://github.com/ohmyzsh/ohmyzsh/archive/master.tar.gz
    - target: .oh-my-zsh/custom/plugins/zsh-completions
      url: https://github.com/zsh-users/zsh-completions/archive/master.tar.gz
    - target: .oh-my-zsh/custom/plugins/zsh-256color
      url: https://github.com/chrissicool/zsh-256color/archive/master.tar.gz
    - target: .oh-my-zsh/custom/plugins/zsh-syntax-highlighting
      url: https://github.com/zsh-users/zsh-syntax-highlighting/archive/master.tar.gz
    - target: .oh-my-zsh/custom/plugins/fzf-tab
      url: https://github.com/Aloxaf/fzf-tab/archive/master.tar.gz
    - target: .config/zsh/plugins/zsh-defer
      url: https://github.com/romkatv/zsh-defer/archive/master.tar.gz
    - target: .config/zsh/plugins/zsh-autosuggestions
      url: https://github.com/zsh-users/zsh-autosuggestions/archive/master.tar.gz
    - target: .config/zsh/plugins/fast-syntax-highlighting
      url: https://github.com/zdharma-continuum/fast-syntax-highlighting/archive/master.tar.gz
    - target: .oh-my-zsh/custom/themes/powerlevel10k
      url: https://github.com/romkatv/powerlevel10k/archive/master.tar.gz
  git_repos:
    - target: .config/nvim
      url: git@github.com:pppobear/lazyvim-config.git
      refreshPeriod: 1h
    - target: .local/share/tmux/plugins/tpm
      url: https://github.com/tmux-plugins/tpm
